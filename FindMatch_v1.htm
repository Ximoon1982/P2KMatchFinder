<div id="p2kMatchSearch" style="max-width:720px;margin:20px auto;padding:20px;border:1px solid rgba(255,190,60,.45);border-radius:14px;background:linear-gradient(135deg,#27231f,#171513);color:#eee;font-family:Arial,sans-serif;box-shadow:0 8px 24px rgba(0,0,0,.35);">

  <div style="font-size:22px;font-weight:bold;color:#f6b73c;margin-bottom:16px;">
    Open Daily Matches
  </div>

  <label for="p2kNickname" style="display:block;font-weight:bold;margin-bottom:6px;">
    Please enter your nickname
  </label>

  <input id="p2kNickname"
         type="text"
         autocomplete="off"
         placeholder="Chess.com nickname"
         style="box-sizing:border-box;width:100%;padding:11px 12px;margin-bottom:16px;border:1px solid #6b6258;border-radius:7px;background:#111;color:#fff;font-size:15px;">

  <div style="margin-bottom:16px;line-height:2;">
    <label style="margin-right:18px;cursor:pointer;">
      <input type="radio" name="p2kMatchType" value="classical">
      Classical chess matches
    </label>

    <label style="margin-right:18px;cursor:pointer;">
      <input type="radio" name="p2kMatchType" value="chess960">
      Chess 960 matches
    </label>

    <label style="cursor:pointer;">
      <input type="radio" name="p2kMatchType" value="all" checked>
      All daily matches
    </label>
  </div>

  <button id="p2kSearchButton"
          type="button"
          style="padding:10px 25px;border:0;border-radius:7px;background:#d98d18;color:#fff;font-size:15px;font-weight:bold;cursor:pointer;">
    Search
  </button>

  <div id="p2kProgress"
       aria-live="polite"
       style="display:none;margin-top:18px;padding:11px;border-radius:7px;background:rgba(255,183,60,.12);color:#ffd078;font-weight:bold;">
  </div>

  <div id="p2kResults" style="margin-top:16px;"></div>
</div>

<script>
(function () {
  "use strict";

  const LIST_URL =
    "https://api.chess.com/pub/club/promote-to-king/matches";

  const nicknameInput = document.getElementById("p2kNickname");
  const searchButton = document.getElementById("p2kSearchButton");
  const progressBox = document.getElementById("p2kProgress");
  const resultsBox = document.getElementById("p2kResults");

  function escapeHTML(value) {
    return String(value ?? "")
      .replaceAll("&", "&amp;")
      .replaceAll("<", "&lt;")
      .replaceAll(">", "&gt;")
      .replaceAll('"', "&quot;")
      .replaceAll("'", "&#039;");
  }

  function delay(milliseconds) {
    return new Promise(resolve => setTimeout(resolve, milliseconds));
  }

  function allowScreenUpdate() {
    return new Promise(resolve =>
      requestAnimationFrame(() => requestAnimationFrame(resolve))
    );
  }

  async function loadJSON(url) {
    let lastError;

    for (let attempt = 1; attempt <= 3; attempt++) {
      try {
        const response = await fetch(url, {
          method: "GET",
          headers: {
            "Accept": "application/json"
          },
          cache: "no-store"
        });

        if (!response.ok) {
          throw new Error(
            "HTTP error " + response.status + " while loading " + url
          );
        }

        return await response.json();
      } catch (error) {
        lastError = error;

        if (attempt < 3) {
          await delay(attempt * 750);
        }
      }
    }

    throw lastError;
  }

  function selectedMatchType() {
    const selected = document.querySelector(
      'input[name="p2kMatchType"]:checked'
    );

    return selected ? selected.value : "all";
  }

  function isChess960(match) {
    return String(match?.settings?.rules || "").toLowerCase() === "chess960";
  }

  function matchesSelectedType(match, type) {
    if (type === "all") {
      return true;
    }

    if (type === "chess960") {
      return isChess960(match);
    }

    return !isChess960(match);
  }

  function findP2KTeam(match) {
    const teams = Object.values(match?.teams || {});

    return teams.find(team => {
      const apiURL = String(team?.["@id"] || "").toLowerCase();
      const webURL = String(team?.url || "").toLowerCase();

      return apiURL.includes("/club/promote-to-king") ||
             webURL.includes("/club/promote-to-king");
    }) || null;
  }

  function nicknameIsRegistered(match, nickname) {
    const team = findP2KTeam(match);

    if (!team || !Array.isArray(team.players)) {
      return false;
    }

    const searchedNickname = nickname.trim().toLowerCase();

    return team.players.some(player =>
      String(player?.username || "").toLowerCase() === searchedNickname
    );
  }

  function displayResults(matches, nickname, failedCount) {
    if (matches.length === 0) {
      resultsBox.innerHTML =
        '<div style="padding:12px;border-radius:7px;background:rgba(255,255,255,.06);">' +
          "No open match corresponds to the selected category." +
        "</div>";

      return;
    }

    let html =
      '<div style="margin-bottom:10px;font-weight:bold;color:#f6b73c;">' +
        matches.length + " matching open match" +
        (matches.length === 1 ? "" : "es") +
      "</div>";

    for (const match of matches) {
      const registered = nicknameIsRegistered(match, nickname);
      const matchName = escapeHTML(match.name || "Unnamed match");
      const matchURL = escapeHTML(match.url || "#");
      const rules = isChess960(match) ? "Chess 960" : "Classical chess";

      html +=
        '<div style="margin:9px 0;padding:12px;border-left:4px solid ' +
        (registered ? "#61b861" : "#d98d18") +
        ';border-radius:7px;background:rgba(255,255,255,.055);">' +

          '<div style="font-weight:bold;margin-bottom:6px;">' +
            '<a href="' + matchURL + '" target="_blank" rel="noopener noreferrer" ' +
               'style="color:#ffd078;text-decoration:none;">' +
              matchName +
            "</a>" +
          "</div>" +

          '<div style="font-size:13px;color:#bbb;">' +
            escapeHTML(rules) +
            " &bull; " +
            '<span style="color:' +
              (registered ? "#79d879" : "#ffbc55") +
              ';font-weight:bold;">' +
              (registered
                ? escapeHTML(nickname) + " is already registered"
                : escapeHTML(nickname) + " is not registered") +
            "</span>" +
          "</div>" +
        "</div>";
    }

    if (failedCount > 0) {
      html +=
        '<div style="margin-top:12px;color:#ff9a82;font-size:13px;">' +
          failedCount + " match" +
          (failedCount === 1 ? "" : "es") +
          " could not be loaded." +
        "</div>";
    }

    resultsBox.innerHTML = html;
  }

  async function searchMatches() {
    const nickname = nicknameInput.value.trim();
    const matchType = selectedMatchType();

    if (!nickname) {
      progressBox.style.display = "block";
      progressBox.style.color = "#ff9a82";
      progressBox.textContent = "Please enter your nickname.";
      nicknameInput.focus();
      return;
    }

    searchButton.disabled = true;
    searchButton.style.opacity = "0.55";
    searchButton.style.cursor = "wait";

    progressBox.style.display = "block";
    progressBox.style.color = "#ffd078";
    progressBox.textContent = "Loading the registration match list...";

    resultsBox.innerHTML = "";

    try {
      const clubMatches = await loadJSON(LIST_URL);
      const registrationMatches = Array.isArray(clubMatches.registered)
        ? clubMatches.registered
        : [];

      const totalMatches = registrationMatches.length;
      const loadedMatches = [];
      let failedCount = 0;

      if (totalMatches === 0) {
        progressBox.textContent =
          "There are currently no matches open for registration.";
        return;
      }

      for (let index = 0; index < totalMatches; index++) {
        const currentNumber = index + 1;
        const listItem = registrationMatches[index];

        progressBox.textContent =
          "Processing match " +
          currentNumber +
          " of " +
          totalMatches;

        await allowScreenUpdate();

        try {
          if (!listItem["@id"]) {
            throw new Error("The match has no @id URL.");
          }

          const matchDetails = await loadJSON(listItem["@id"]);

          loadedMatches.push({
            ...listItem,
            ...matchDetails
          });
        } catch (error) {
          failedCount++;
          console.error(
            "Unable to load match " + currentNumber,
            listItem,
            error
          );
        }
      }

      const filteredMatches = loadedMatches.filter(match =>
        matchesSelectedType(match, matchType)
      );

      progressBox.style.color = "#8fd68f";
      progressBox.textContent =
        "Processing completed: " +
        loadedMatches.length +
        " of " +
        totalMatches +
        " matches loaded.";

      displayResults(filteredMatches, nickname, failedCount);

    } catch (error) {
      console.error(error);

      progressBox.style.color = "#ff9a82";
      progressBox.textContent =
        "Unable to load the match list. Please try again later.";

    } finally {
      searchButton.disabled = false;
      searchButton.style.opacity = "1";
      searchButton.style.cursor = "pointer";
    }
  }

  searchButton.addEventListener("click", searchMatches);

  nicknameInput.addEventListener("keydown", function (event) {
    if (event.key === "Enter") {
      searchMatches();
    }
  });
})();
</script>
