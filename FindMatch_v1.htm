<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="color-scheme" content="dark">
  <title>Promote to King — Open Daily Match Finder</title>
  <!-- Version 5: recommendations and paginated results -->
  <style>
    :root {
      font-family: Arial, Helvetica, sans-serif;
      color: #eee;
      background: transparent;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      padding: 12px;
      background: transparent;
    }

    .finder {
      width: min(100%, 760px);
      margin: 0 auto;
      padding: 20px;
      border: 1px solid rgba(255, 190, 60, .45);
      border-radius: 14px;
      background: linear-gradient(135deg, #27231f, #171513);
      box-shadow: 0 8px 24px rgba(0, 0, 0, .35);
    }

    .title {
      margin: 0 0 16px;
      color: #f6b73c;
      font-size: 22px;
      font-weight: 700;
    }

    .field-label {
      display: block;
      margin-bottom: 6px;
      font-weight: 700;
    }

    .username {
      width: 100%;
      padding: 11px 12px;
      border: 1px solid #6b6258;
      border-radius: 7px;
      background: #111;
      color: #fff;
      font-size: 15px;
    }

    .username:focus {
      outline: 2px solid rgba(246, 183, 60, .55);
      outline-offset: 2px;
    }

    .filter-group {
      margin: 16px 0 0;
      padding: 0;
      border: 0;
    }

    .filter-group + .filter-group { margin-top: 14px; }

    .filter-title {
      margin: 0 0 8px;
      padding: 0;
      color: #d7d2cb;
      font-size: 14px;
      font-weight: 700;
    }

    .choices {
      display: flex;
      flex-wrap: wrap;
      gap: 8px 18px;
      margin: 0;
    }

    .choice {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      cursor: pointer;
    }

    .search-button {
      padding: 10px 25px;
      border: 0;
      border-radius: 7px;
      background: #d98d18;
      color: #fff;
      font-size: 15px;
      font-weight: 700;
      cursor: pointer;
    }

    .search-button:hover:not(:disabled) { filter: brightness(1.08); }

    .search-button:disabled {
      cursor: wait;
      opacity: .55;
    }

    .status {
      display: none;
      margin-top: 18px;
      padding: 11px;
      border-radius: 7px;
      background: rgba(255, 183, 60, .12);
      color: #ffd078;
      font-weight: 700;
    }

    .status.error {
      background: rgba(255, 110, 90, .10);
      color: #ff9a82;
    }

    .status.success {
      background: rgba(90, 190, 100, .10);
      color: #8fd68f;
    }

    .progress-track {
      display: none;
      height: 7px;
      margin-top: 8px;
      overflow: hidden;
      border-radius: 999px;
      background: rgba(255, 255, 255, .10);
    }

    .progress-bar {
      width: 0;
      height: 100%;
      border-radius: inherit;
      background: #f6b73c;
      transition: width .15s ease;
    }

    .ratings {
      display: none;
      margin-top: 12px;
      padding: 10px 12px;
      border-radius: 7px;
      background: rgba(255, 255, 255, .055);
      color: #d7d2cb;
      font-size: 13px;
      line-height: 1.55;
    }

    .ratings strong { color: #ffd078; }

    .results { margin-top: 16px; }

    .result-summary {
      margin-bottom: 10px;
      color: #f6b73c;
      font-weight: 700;
    }

    .empty,
    .warning {
      padding: 12px;
      border-radius: 7px;
      background: rgba(255, 255, 255, .06);
    }

    .warning {
      margin-top: 12px;
      color: #ff9a82;
      font-size: 13px;
    }

    .match-card {
      margin: 9px 0;
      padding: 12px;
      border-left: 4px solid #d98d18;
      border-radius: 7px;
      background: rgba(255, 255, 255, .055);
    }

    .match-card.registered { border-left-color: #61b861; }

    .match-card.priority {
      border-left-color: #d94a3a;
      background: linear-gradient(90deg, rgba(217, 74, 58, .13), rgba(255, 255, 255, .055) 42%);
    }

    .match-card.priority .match-title { color: #ff725f; }

    .match-title {
      display: inline-block;
      margin-bottom: 7px;
      color: #ffd078;
      font-weight: 700;
      line-height: 1.35;
      text-decoration: none;
    }

    .match-title:hover { text-decoration: underline; }

    .match-details {
      color: #c9c2b9;
      font-size: 13px;
      line-height: 1.55;
    }

    .eligible { color: #8fd68f; font-weight: 700; }
    .registered-text { color: #79d879; font-weight: 700; }
    .override-text { color: #ffd078; font-weight: 700; }
    .start-date { color: #f0e4cf; font-weight: 700; }

    .recommendation-line {
      margin-top: 7px;
      color: #bfe7c3;
      font-size: 12px;
      line-height: 1.5;
    }

    .recommended-badge {
      display: inline-block;
      margin-right: 5px;
      padding: 2px 7px;
      border: 1px solid rgba(104, 202, 116, .55);
      border-radius: 999px;
      background: rgba(80, 175, 92, .13);
      color: #91e09a;
      font-size: 11px;
      font-weight: 700;
      letter-spacing: .01em;
    }

    .result-controls {
      display: flex;
      flex-wrap: wrap;
      gap: 9px;
      margin-top: 14px;
    }

    .load-button {
      padding: 9px 15px;
      border: 1px solid rgba(246, 183, 60, .55);
      border-radius: 7px;
      background: rgba(217, 141, 24, .16);
      color: #ffd078;
      font-size: 13px;
      font-weight: 700;
      cursor: pointer;
    }

    .load-button:hover { filter: brightness(1.12); }

    .load-button.secondary {
      border-color: rgba(255, 255, 255, .25);
      background: rgba(255, 255, 255, .06);
      color: #ddd5ca;
    }

    @media (max-width: 540px) {
      body { padding: 6px; }
      .finder { padding: 16px; }
      .choices { flex-direction: column; gap: 9px; }
      .search-button { width: 100%; }
    }
  </style>
</head>
<body>
  <main id="p2kMatchSearch" class="finder">
    <h1 class="title">Open Daily Matches</h1>

    <label class="field-label" for="p2kUsername">Please enter your user name</label>
    <input
      id="p2kUsername"
      class="username"
      type="text"
      autocomplete="off"
      autocapitalize="none"
      spellcheck="false"
      placeholder="Chess.com user name"
    >

    <fieldset class="filter-group">
      <legend class="filter-title">Match type</legend>
      <div class="choices">
        <label class="choice">
          <input type="radio" name="p2kMatchType" value="classical">
          <span>Classical chess matches</span>
        </label>

        <label class="choice">
          <input type="radio" name="p2kMatchType" value="chess960">
          <span>Chess 960 matches</span>
        </label>

        <label class="choice">
          <input type="radio" name="p2kMatchType" value="all" checked>
          <span>All daily matches</span>
        </label>
      </div>
    </fieldset>

    <fieldset class="filter-group">
      <legend class="filter-title">Registration status</legend>
      <div class="choices">
        <label class="choice">
          <input type="radio" name="p2kRegistrationStatus" value="registered">
          <span>Registered</span>
        </label>

        <label class="choice">
          <input type="radio" name="p2kRegistrationStatus" value="not_registered" checked>
          <span>Not registered</span>
        </label>

        <label class="choice">
          <input type="radio" name="p2kRegistrationStatus" value="all">
          <span>All matches</span>
        </label>
      </div>
    </fieldset>

    <fieldset class="filter-group">
      <legend class="filter-title">Recommendation filter</legend>
      <div class="choices">
        <label class="choice">
          <input type="radio" name="p2kRecommendationFilter" value="recommended" checked>
          <span>Recommended matches</span>
        </label>

        <label class="choice">
          <input type="radio" name="p2kRecommendationFilter" value="all">
          <span>All matches</span>
        </label>
      </div>
    </fieldset>

    <button id="p2kSearchButton" class="search-button" type="button" style="margin-top:16px">Search</button>

    <div id="p2kStatus" class="status" aria-live="polite">
      <div id="p2kStatusText"></div>
      <div id="p2kProgressTrack" class="progress-track" aria-hidden="true">
        <div id="p2kProgressBar" class="progress-bar"></div>
      </div>
    </div>

    <div id="p2kRatings" class="ratings"></div>
    <div id="p2kResults" class="results"></div>
  </main>

  <script>
    (() => {
      "use strict";

      const CLUB_ID = "promote-to-king";
      const CLUB_MATCHES_URL = `https://api.chess.com/pub/club/${CLUB_ID}/matches`;
      const REQUEST_ATTEMPTS = 3;
      const JSONP_TIMEOUT_MS = 20000;
      const PAGE_SIZE = 5;
      const PRIORITY_LEAGUE_ACRONYMS = ["1WL", "TCMAC", "KOTML", "TMCL", "WKCL", "PCL"];

      const usernameInput = document.getElementById("p2kUsername");
      const searchButton = document.getElementById("p2kSearchButton");
      const statusBox = document.getElementById("p2kStatus");
      const statusText = document.getElementById("p2kStatusText");
      const progressTrack = document.getElementById("p2kProgressTrack");
      const progressBar = document.getElementById("p2kProgressBar");
      const ratingsBox = document.getElementById("p2kRatings");
      const resultsBox = document.getElementById("p2kResults");

      let resultState = {
        matches: [],
        username: "",
        failedCount: 0,
        registrationStatus: "not_registered",
        visibleCount: PAGE_SIZE
      };

      class HttpError extends Error {
        constructor(status, url) {
          super(`HTTP ${status} while loading ${url}`);
          this.name = "HttpError";
          this.status = status;
          this.url = url;
        }
      }

      function delay(milliseconds) {
        return new Promise(resolve => window.setTimeout(resolve, milliseconds));
      }

      function allowScreenUpdate() {
        return new Promise(resolve => {
          window.requestAnimationFrame(() => window.requestAnimationFrame(resolve));
        });
      }

      function setStatus(message, state = "working", progress = null) {
        statusBox.style.display = "block";
        statusBox.classList.toggle("error", state === "error");
        statusBox.classList.toggle("success", state === "success");
        statusText.textContent = message;

        if (progress === null) {
          progressTrack.style.display = "none";
          progressBar.style.width = "0%";
        } else {
          const safeProgress = Math.max(0, Math.min(100, progress));
          progressTrack.style.display = "block";
          progressBar.style.width = `${safeProgress}%`;
        }
      }

      function selectedMatchType() {
        return document.querySelector('input[name="p2kMatchType"]:checked')?.value || "all";
      }

      function selectedRegistrationStatus() {
        return document.querySelector('input[name="p2kRegistrationStatus"]:checked')?.value || "not_registered";
      }

      function selectedRecommendationFilter() {
        return document.querySelector('input[name="p2kRecommendationFilter"]:checked')?.value || "recommended";
      }

      function appendCallbackParameter(url, callbackName) {
        const separator = url.includes("?") ? "&" : "?";
        return `${url}${separator}callback=${encodeURIComponent(callbackName)}`;
      }

      function loadJSONP(url) {
        return new Promise((resolve, reject) => {
          const callbackName = `p2kJsonp_${Date.now()}_${Math.random().toString(36).slice(2)}`;
          const script = document.createElement("script");
          let timer = null;

          const cleanup = () => {
            if (timer !== null) window.clearTimeout(timer);
            script.remove();
            try { delete window[callbackName]; } catch (_) { window[callbackName] = undefined; }
          };

          window[callbackName] = data => {
            cleanup();
            resolve(data);
          };

          script.onerror = () => {
            cleanup();
            reject(new Error(`JSONP request failed for ${url}`));
          };

          timer = window.setTimeout(() => {
            cleanup();
            reject(new Error(`JSONP request timed out for ${url}`));
          }, JSONP_TIMEOUT_MS);

          script.src = appendCallbackParameter(url, callbackName);
          script.async = true;
          document.head.appendChild(script);
        });
      }

      async function requestJSONOnce(url) {
        try {
          const response = await fetch(url, {
            method: "GET",
            mode: "cors",
            cache: "no-store"
          });

          if (!response.ok) throw new HttpError(response.status, url);
          return await response.json();
        } catch (error) {
          if (error instanceof HttpError) throw error;
          return await loadJSONP(url);
        }
      }

      async function loadJSON(url) {
        let lastError = null;

        for (let attempt = 1; attempt <= REQUEST_ATTEMPTS; attempt += 1) {
          try {
            return await requestJSONOnce(url);
          } catch (error) {
            lastError = error;

            if (error instanceof HttpError && error.status === 404) throw error;
            if (attempt < REQUEST_ATTEMPTS) await delay(attempt * 800);
          }
        }

        throw lastError || new Error(`Unable to load ${url}`);
      }

      function getLastRating(stats, key) {
        const value = stats?.[key]?.last?.rating;
        return Number.isFinite(Number(value)) ? Number(value) : null;
      }

      function getMatchRules(match) {
        return String(match?.settings?.rules || "").toLowerCase();
      }

      function isSupportedDailyMatch(match) {
        const timeClass = String(match?.settings?.time_class || match?.time_class || "").toLowerCase();
        const rules = getMatchRules(match);
        return timeClass === "daily" && (rules === "chess" || rules === "chess960");
      }

      function matchesTypeSelection(match, selectedType) {
        const rules = getMatchRules(match);
        if (selectedType === "all") return rules === "chess" || rules === "chess960";
        if (selectedType === "chess960") return rules === "chess960";
        return rules === "chess";
      }

      function findPromoteToKingTeam(match) {
        const teams = Object.values(match?.teams || {});
        const expectedApiFragment = `/club/${CLUB_ID}`;
        const expectedWebFragment = `/club/${CLUB_ID}`;

        return teams.find(team => {
          const apiUrl = String(team?.["@id"] || "").toLowerCase();
          const webUrl = String(team?.url || "").toLowerCase();
          return apiUrl.includes(expectedApiFragment) || webUrl.includes(expectedWebFragment);
        }) || null;
      }

      function findOpponentTeam(match, promoteToKingTeam) {
        return Object.values(match?.teams || {}).find(team => team !== promoteToKingTeam) || null;
      }

      function isTeamUnlocked(team) {
        return team?.locked === false;
      }

      function isUserRegistered(team, username) {
        const normalizedUsername = username.toLowerCase();
        return Array.isArray(team?.players) && team.players.some(player =>
          String(player?.username || "").toLowerCase() === normalizedUsername
        );
      }

      function findRegisteredPlayer(team, username) {
        const normalizedUsername = username.toLowerCase();
        return Array.isArray(team?.players)
          ? team.players.find(player => String(player?.username || "").toLowerCase() === normalizedUsername) || null
          : null;
      }

      function numericPlayerRatings(team, excludedUsername = null) {
        const normalizedExcluded = excludedUsername === null ? null : excludedUsername.toLowerCase();

        return (Array.isArray(team?.players) ? team.players : [])
          .filter(player => normalizedExcluded === null || String(player?.username || "").toLowerCase() !== normalizedExcluded)
          .map(player => {
            const rawRating = player?.rating;
            if (rawRating === undefined || rawRating === null || rawRating === "") return null;
            const parsedRating = Number(rawRating);
            return Number.isFinite(parsedRating) ? parsedRating : null;
          })
          .filter(rating => rating !== null)
          .sort((a, b) => b - a);
      }

      function pairedLineupAdvantage(promoteRatings, opponentRatings) {
        const boardCount = Math.min(promoteRatings.length, opponentRatings.length);
        if (boardCount === 0) return null;

        let promoteTotal = 0;
        let opponentTotal = 0;

        for (let index = 0; index < boardCount; index += 1) {
          promoteTotal += promoteRatings[index];
          opponentTotal += opponentRatings[index];
        }

        return {
          boardCount,
          promoteAverage: promoteTotal / boardCount,
          opponentAverage: opponentTotal / boardCount,
          opponentAdvantage: (opponentTotal - promoteTotal) / boardCount
        };
      }

      function evaluateRecommendation(match, promoteTeam, username, profileRating, registered) {
        const opponentTeam = findOpponentTeam(match, promoteTeam);
        const promotePlayers = Array.isArray(promoteTeam?.players) ? promoteTeam.players : [];
        const opponentPlayers = Array.isArray(opponentTeam?.players) ? opponentTeam.players : [];
        const reasons = [];

        if (!opponentTeam) {
          return { recommended: false, reasons, opponentTeam: null };
        }

        const playerCountReason = opponentPlayers.length > promotePlayers.length;
        if (playerCountReason) {
          reasons.push(
            `${opponentTeam.name || "The opponent"} has ${opponentPlayers.length} registered player${opponentPlayers.length === 1 ? "" : "s"}; ` +
            `Promote to King has ${promotePlayers.length}.`
          );
        }

        const opponentRatings = numericPlayerRatings(opponentTeam);
        const promoteRatings = numericPlayerRatings(promoteTeam);
        let ratingReason = false;

        if (registered) {
          const currentComparison = pairedLineupAdvantage(promoteRatings, opponentRatings);
          const comparisonWithoutUser = pairedLineupAdvantage(
            numericPlayerRatings(promoteTeam, username),
            opponentRatings
          );

          if (
            currentComparison !== null &&
            comparisonWithoutUser !== null &&
            currentComparison.opponentAdvantage > 0 &&
            comparisonWithoutUser.opponentAdvantage > currentComparison.opponentAdvantage
          ) {
            ratingReason = true;
            const improvement = Math.max(1, Math.round(
              comparisonWithoutUser.opponentAdvantage - currentComparison.opponentAdvantage
            ));
            reasons.push(
              `The opponent's paired lineup averages ${Math.max(1, Math.round(currentComparison.opponentAdvantage))} rating points higher; ` +
              `this user's registration improves the projected matchup by about ${improvement} point${improvement === 1 ? "" : "s"}.`
            );
          }
        } else if (profileRating !== null) {
          const currentComparison = pairedLineupAdvantage(promoteRatings, opponentRatings);
          const simulatedPromoteRatings = [...promoteRatings, profileRating].sort((a, b) => b - a);
          const comparisonWithUser = pairedLineupAdvantage(simulatedPromoteRatings, opponentRatings);

          if (
            currentComparison !== null &&
            comparisonWithUser !== null &&
            currentComparison.opponentAdvantage > 0 &&
            comparisonWithUser.opponentAdvantage < currentComparison.opponentAdvantage
          ) {
            ratingReason = true;
            const improvement = Math.max(1, Math.round(
              currentComparison.opponentAdvantage - comparisonWithUser.opponentAdvantage
            ));
            reasons.push(
              `The opponent's paired lineup currently averages ${Math.max(1, Math.round(currentComparison.opponentAdvantage))} rating points higher; ` +
              `joining improves the projected matchup by about ${improvement} point${improvement === 1 ? "" : "s"}.`
            );
          }
        }

        return {
          recommended: playerCountReason || ratingReason,
          reasons,
          opponentTeam
        };
      }

      function numericBound(value, fallback) {
        if (value === undefined || value === null || value === "") return fallback;
        const parsed = Number(value);
        return Number.isFinite(parsed) ? parsed : fallback;
      }

      function getRatingBounds(match) {
        return {
          minimum: numericBound(match?.settings?.min_rating, 0),
          maximum: numericBound(match?.settings?.max_rating, Number.POSITIVE_INFINITY)
        };
      }

      function ratingForMatch(match, ratings) {
        return getMatchRules(match) === "chess960" ? ratings.chess960 : ratings.classical;
      }

      function isRatingEligible(rating, bounds) {
        return rating !== null && rating >= bounds.minimum && rating <= bounds.maximum;
      }

      function formatRating(value) {
        return value === null ? "not available" : String(value);
      }

      function formatRatingRange(bounds) {
        if (!Number.isFinite(bounds.maximum)) return `${bounds.minimum}+`;
        return `${bounds.minimum}–${bounds.maximum}`;
      }

      function formatMatchType(match) {
        return getMatchRules(match) === "chess960" ? "Chess 960" : "Classical chess";
      }

      function isPriorityMatch(match) {
        const name = String(match?.name || "").toUpperCase();
        return PRIORITY_LEAGUE_ACRONYMS.some(acronym => name.includes(acronym));
      }

      function matchStartTimestamp(match) {
        const value = Number(match?.start_time);
        return Number.isFinite(value) && value > 0 ? value : null;
      }

      function formatStartDate(match) {
        const timestamp = matchStartTimestamp(match);
        if (timestamp === null) return "Not scheduled";

        return new Intl.DateTimeFormat("en-GB", {
          timeZone: "UTC",
          day: "2-digit",
          month: "short",
          year: "numeric",
          hour: "2-digit",
          minute: "2-digit",
          hour12: false,
          timeZoneName: "short"
        }).format(new Date(timestamp * 1000));
      }

      function showRatings(username, ratings) {
        ratingsBox.style.display = "block";
        ratingsBox.innerHTML =
          `<strong>${escapeHTML(username)}</strong> — ` +
          `Daily classical: <strong>${formatRating(ratings.classical)}</strong> · ` +
          `Daily Chess 960: <strong>${formatRating(ratings.chess960)}</strong>`;
      }

      function escapeHTML(value) {
        return String(value ?? "")
          .replaceAll("&", "&amp;")
          .replaceAll("<", "&lt;")
          .replaceAll(">", "&gt;")
          .replaceAll('"', "&quot;")
          .replaceAll("'", "&#039;");
      }

      function sortMatchesForDisplay(matches) {
        return [...matches].sort((a, b) => {
          const priorityDifference = Number(isPriorityMatch(b.match)) - Number(isPriorityMatch(a.match));
          if (priorityDifference !== 0) return priorityDifference;

          const aStart = matchStartTimestamp(a.match) ?? Number.POSITIVE_INFINITY;
          const bStart = matchStartTimestamp(b.match) ?? Number.POSITIVE_INFINITY;
          return aStart - bStart || String(a.match?.name || "").localeCompare(String(b.match?.name || ""));
        });
      }

      function resultSummaryLabel(total, registrationStatus) {
        if (registrationStatus === "registered") {
          return `${total} registered open match${total === 1 ? "" : "es"}`;
        }
        if (registrationStatus === "not_registered") {
          return `${total} available unregistered match${total === 1 ? "" : "es"}`;
        }
        return `${total} matching open match${total === 1 ? "" : "es"}`;
      }

      function renderResults() {
        const { matches, username, failedCount, registrationStatus } = resultState;
        const total = matches.length;

        if (total === 0) {
          let emptyMessage = "No open match corresponds to the selected filters.";

          if (registrationStatus === "registered") {
            emptyMessage = "This user is not registered in any open match matching the selected filters.";
          } else if (registrationStatus === "not_registered") {
            emptyMessage = "No unlocked, rating-eligible, unregistered match corresponds to the selected filters.";
          } else if (registrationStatus === "all") {
            emptyMessage = "No unlocked, rating-eligible match corresponds to the selected filters.";
          }

          resultsBox.innerHTML = `<div class="empty">${escapeHTML(emptyMessage)}</div>`;

          if (failedCount > 0) {
            resultsBox.insertAdjacentHTML(
              "beforeend",
              `<div class="warning">${failedCount} match${failedCount === 1 ? "" : "es"} could not be loaded.</div>`
            );
          }
          return;
        }

        const visibleCount = Math.min(resultState.visibleCount, total);
        const visibleMatches = matches.slice(0, visibleCount);
        const baseLabel = resultSummaryLabel(total, registrationStatus);
        let html = `<div class="result-summary">Showing ${visibleCount} of ${baseLabel}</div>`;

        for (const entry of visibleMatches) {
          const { match, rating, bounds, registered, registeredOverride, recommendation } = entry;
          const matchName = escapeHTML(match.name || "Unnamed match");
          const matchUrl = escapeHTML(match.url || "#");
          const type = escapeHTML(formatMatchType(match));
          const startDate = escapeHTML(formatStartDate(match));
          const ratingText = rating === null ? "not available" : escapeHTML(rating);
          const range = escapeHTML(formatRatingRange(bounds));

          let statusLine;
          if (registeredOverride) {
            statusLine =
              `<span class="registered-text">${escapeHTML(username)} is registered</span>` +
              ` · <span class="override-text">Shown regardless of team lock and rating limits</span>`;
          } else {
            statusLine =
              `<span class="eligible">Eligible and registration unlocked for Promote to King</span>` +
              (registered
                ? ` · <span class="registered-text">${escapeHTML(username)} is already registered</span>`
                : ` · ${escapeHTML(username)} is not registered`);
          }

          const priority = isPriorityMatch(match);
          const recommendationLine = recommendation?.recommended
            ? `<div class="recommendation-line"><span class="recommended-badge">Recommended</span>${escapeHTML(recommendation.reasons.join(" "))}</div>`
            : "";

          html +=
            `<article class="match-card${registered ? " registered" : ""}${priority ? " priority" : ""}">` +
              `<a class="match-title" href="${matchUrl}" target="_blank" rel="noopener noreferrer">${matchName}</a>` +
              `<div class="match-details">` +
                `<span class="start-date">Start: ${startDate}</span><br>` +
                `${type} · Your rating: <strong>${ratingText}</strong> · Accepted range: <strong>${range}</strong><br>` +
                statusLine +
                recommendationLine +
              `</div>` +
            `</article>`;
        }

        if (visibleCount < total) {
          html +=
            `<div class="result-controls">` +
              `<button id="p2kLoadMore" class="load-button" type="button">Load 5 more</button>` +
              `<button id="p2kLoadAll" class="load-button secondary" type="button">Load all</button>` +
            `</div>`;
        }

        if (failedCount > 0) {
          html += `<div class="warning">${failedCount} match${failedCount === 1 ? "" : "es"} could not be loaded.</div>`;
        }

        resultsBox.innerHTML = html;

        document.getElementById("p2kLoadMore")?.addEventListener("click", () => {
          resultState.visibleCount = Math.min(resultState.visibleCount + PAGE_SIZE, total);
          renderResults();
        });

        document.getElementById("p2kLoadAll")?.addEventListener("click", () => {
          resultState.visibleCount = total;
          renderResults();
        });
      }

      function displayResults(matches, username, failedCount, registrationStatus) {
        resultState = {
          matches: sortMatchesForDisplay(matches),
          username,
          failedCount,
          registrationStatus,
          visibleCount: PAGE_SIZE
        };
        renderResults();
      }

      function validateRequestedRatings(selectedType, ratings, registrationStatus) {
        if (registrationStatus === "registered") return;

        if (selectedType === "classical" && ratings.classical === null) {
          throw new Error("This user has no Daily classical rating available.");
        }

        if (selectedType === "chess960" && ratings.chess960 === null) {
          throw new Error("This user has no Daily Chess 960 rating available.");
        }

        if (selectedType === "all" && ratings.classical === null && ratings.chess960 === null) {
          throw new Error("This user has no Daily classical or Daily Chess 960 rating available.");
        }
      }

      async function searchMatches() {
        const username = usernameInput.value.trim();
        const selectedType = selectedMatchType();
        const registrationStatus = selectedRegistrationStatus();
        const recommendationFilter = selectedRecommendationFilter();

        if (!username) {
          setStatus("Please enter your user name.", "error");
          usernameInput.focus();
          return;
        }

        searchButton.disabled = true;
        resultsBox.innerHTML = "";
        ratingsBox.style.display = "none";
        ratingsBox.innerHTML = "";

        try {
          setStatus(`Loading ratings for ${username}...`);

          const statsUrl = `https://api.chess.com/pub/player/${encodeURIComponent(username.toLowerCase())}/stats`;
          const stats = await loadJSON(statsUrl);
          const ratings = {
            classical: getLastRating(stats, "chess_daily"),
            chess960: getLastRating(stats, "chess960_daily")
          };

          showRatings(username, ratings);
          validateRequestedRatings(selectedType, ratings, registrationStatus);

          setStatus("Loading the registration match list...");
          const clubMatches = await loadJSON(CLUB_MATCHES_URL);
          const registrationMatches = Array.isArray(clubMatches.registered)
            ? clubMatches.registered.filter(item => String(item?.time_class || "").toLowerCase() === "daily")
            : [];

          const totalMatches = registrationMatches.length;
          const eligibleMatches = [];
          let failedCount = 0;

          if (totalMatches === 0) {
            setStatus("There are currently no daily matches open for registration.", "success");
            displayResults([], username, 0, registrationStatus);
            return;
          }

          for (let index = 0; index < totalMatches; index += 1) {
            const currentNumber = index + 1;
            const listItem = registrationMatches[index];
            const percentage = Math.round((currentNumber / totalMatches) * 100);

            setStatus(`Processing match ${currentNumber} of ${totalMatches}`, "working", percentage);
            await allowScreenUpdate();

            try {
              if (!listItem?.["@id"]) throw new Error("The match has no @id URL.");

              const matchDetails = await loadJSON(listItem["@id"]);
              const match = { ...listItem, ...matchDetails };

              if (!isSupportedDailyMatch(match)) continue;
              if (!matchesTypeSelection(match, selectedType)) continue;

              const team = findPromoteToKingTeam(match);
              if (!team) continue;

              const registered = isUserRegistered(team, username);
              const rating = ratingForMatch(match, ratings);
              const bounds = getRatingBounds(match);
              const recommendationRating = registered
                ? numericBound(findRegisteredPlayer(team, username)?.rating, rating)
                : rating;
              const recommendation = evaluateRecommendation(
                match,
                team,
                username,
                recommendationRating,
                registered
              );

              if (registrationStatus === "registered") {
                if (!registered) continue;
                if (recommendationFilter === "recommended" && !recommendation.recommended) continue;

                eligibleMatches.push({
                  match,
                  team,
                  rating,
                  bounds,
                  registered: true,
                  registeredOverride: true,
                  recommendation
                });
                continue;
              }

              if (!isTeamUnlocked(team)) continue;
              if (!isRatingEligible(rating, bounds)) continue;

              if (registrationStatus === "not_registered" && registered) continue;
              if (recommendationFilter === "recommended" && !recommendation.recommended) continue;

              eligibleMatches.push({
                match,
                team,
                rating,
                bounds,
                registered,
                registeredOverride: false,
                recommendation
              });
            } catch (error) {
              failedCount += 1;
              console.error(`Unable to load match ${currentNumber}`, listItem, error);
            }
          }

          setStatus(
            `Processing completed: ${totalMatches - failedCount} of ${totalMatches} matches loaded.`,
            "success",
            100
          );
          displayResults(eligibleMatches, username, failedCount, registrationStatus);
        } catch (error) {
          console.error(error);

          if (error instanceof HttpError && error.status === 404) {
            setStatus("The Chess.com user name was not found.", "error");
          } else {
            setStatus(error?.message || "Unable to complete the search. Please try again later.", "error");
          }
        } finally {
          searchButton.disabled = false;
        }
      }

      searchButton.addEventListener("click", searchMatches);
      usernameInput.addEventListener("keydown", event => {
        if (event.key === "Enter") searchMatches();
      });

      function reportHeight() {
        if (window.parent === window) return;
        window.parent.postMessage(
          {
            type: "p2k-match-finder-height",
            height: Math.ceil(document.documentElement.scrollHeight)
          },
          "*"
        );
      }

      if ("ResizeObserver" in window) {
        new ResizeObserver(reportHeight).observe(document.body);
      }
      window.addEventListener("load", reportHeight);
    })();
  </script>
</body>
</html>
